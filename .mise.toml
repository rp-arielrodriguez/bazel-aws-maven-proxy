# mise configuration for bazel-aws-maven-proxy
# https://mise.jdx.dev/

[env]
_.file = ".env"

[tools]
python = "3.11"

[settings]
# AWS CLI >= 2.9 required (refresh_token grant). Install via: brew install awscli
# Not managed by mise — no native ARM macOS build available via aqua/asdf backends

[tasks.setup]
description = "Interactive first-time setup (prereqs, .env, install, start)"
raw = true
run = "bash scripts/setup.sh"

[tasks.start]
description = "Start complete system (containers + SSO watcher)"
depends = ["containers:up", "sso-install"]

[tasks.stop]
description = "Stop services (containers + watcher agent)"
depends = ["containers:down"]
run = """
set -euo pipefail
USER_ID=$(id -u)
LABEL="com.bazel.sso-watcher"
if launchctl print "gui/$USER_ID/$LABEL" &>/dev/null; then
  launchctl bootout "gui/$USER_ID/$LABEL" 2>/dev/null || true
  echo "SSO watcher agent stopped"
else
  echo "SSO watcher agent not running"
fi
"""

[tasks.uninstall]
description = "Uninstall complete system (containers + SSO watcher)"
depends = ["containers:down", "sso-uninstall"]

[tasks."containers:up"]
description = "Start container services (s3proxy + sso-monitor)"
run = "source scripts/container-engine.sh && $COMPOSE_CMD up -d"

[tasks."containers:down"]
description = "Stop container services"
run = "source scripts/container-engine.sh && $COMPOSE_CMD down"

[tasks."containers:logs"]
description = "View container service logs"
run = "bash scripts/docker-logs.sh"

[tasks."containers:restart"]
description = "Restart container services"
run = "source scripts/container-engine.sh && $COMPOSE_CMD restart"

[tasks.sso-install]
description = "Install SSO watcher as macOS launchd user agent"
run = "bash scripts/sso-install.sh"

[tasks.sso-uninstall]
description = "Uninstall SSO watcher launchd agent"
run = "bash scripts/sso-uninstall.sh"

[tasks.sso-status]
description = "Check SSO watcher launchd agent status"
run = "bash scripts/sso-status.sh"

[tasks.sso-restart]
description = "Restart SSO watcher launchd agent"
run = "bash scripts/sso-restart.sh"

[tasks.sso-logs]
description = "Show recent SSO watcher logs (default 50 lines)"
run = "bash scripts/sso-logs.sh {{arg(name=\"lines\", default=\"50\")}}"

[tasks."sso-logs:follow"]
description = "Stream SSO watcher logs (Ctrl+C to stop)"
run = """
set -euo pipefail
LOG_FILE="$HOME/Library/Logs/sso-watcher.log"
ERROR_LOG="$HOME/Library/Logs/sso-watcher.error.log"
echo "Streaming SSO watcher logs (Ctrl+C to exit)..."
trap 'exit 0' INT TERM
tail -f "$LOG_FILE" "$ERROR_LOG" 2>/dev/null &
wait $!
"""

[tasks.sso-logout]
description = "Logout from AWS SSO (invalidates credentials, triggers renewal)"
run = """
set -euo pipefail
AWS_PROFILE="${AWS_PROFILE:-default}"
SIGNAL_DIR="$HOME/.aws/sso-renewer"

MODE_FILE="$SIGNAL_DIR/mode"
if [ -f "$MODE_FILE" ]; then
  MODE=$(tr -d '[:space:]' < "$MODE_FILE")
else
  MODE="${SSO_LOGIN_MODE:-notify}"
fi

echo "Logging out from AWS SSO (profile: $AWS_PROFILE)..."
aws sso logout 2>/dev/null || true

# Clear cooldown so watcher reacts immediately
rm -f "$SIGNAL_DIR/last-login-at.txt" 2>/dev/null || true

# Create signal file so watcher triggers renewal without waiting for monitor
mkdir -p "$SIGNAL_DIR"
printf '{"profile":"%s","reason":"logout","timestamp":"%s"}\n' \
  "$AWS_PROFILE" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$SIGNAL_DIR/login-required.json"

echo "✓ Logged out — credentials invalidated"
if [ "$MODE" = "standalone" ]; then
  echo "  Login again with: mise run sso-login"
elif [ "$MODE" = "silent" ]; then
  echo "  Silent refresh will attempt within ${SSO_POLL_SECONDS:-5}s"
else
  echo "  Watcher will trigger login within ${SSO_POLL_SECONDS:-5}s"
fi
"""

[tasks.sso-login]
description = "Trigger SSO login (signal watcher or run directly in standalone mode)"
run = """
set -euo pipefail
SIGNAL_DIR="$HOME/.aws/sso-renewer"
SIGNAL_FILE="$SIGNAL_DIR/login-required.json"
MODE_FILE="$SIGNAL_DIR/mode"
AWS_PROFILE="${AWS_PROFILE:-default}"

# Read current mode
if [ -f "$MODE_FILE" ]; then
  MODE=$(tr -d '[:space:]' < "$MODE_FILE")
else
  MODE="${SSO_LOGIN_MODE:-notify}"
fi

if [ "$MODE" = "standalone" ] || [ "$MODE" = "silent" ]; then
  echo "Mode: $MODE — running aws sso login directly"
  aws sso login --profile "$AWS_PROFILE"
  echo "✓ Login complete"
else
  # Clear cooldown so dialog shows immediately
  rm -f "$SIGNAL_DIR/last-login-at.txt" 2>/dev/null || true

  echo "Creating signal file..."
  mkdir -p "$SIGNAL_DIR"

  cat > "$SIGNAL_FILE" << EOF
{
  "profile": "$AWS_PROFILE",
  "reason": "Manual trigger via mise run sso-login",
  "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
}
EOF

  if [ "$MODE" = "auto" ]; then
    echo "✓ Signal created, watcher will open webview within ${SSO_POLL_SECONDS:-5}s"
  else
    echo "✓ Signal created, watcher will show dialog within ${SSO_POLL_SECONDS:-5}s"
  fi
  echo "  Check logs: mise run sso-logs"
fi
"""

[tasks.sso-mode]
description = "Show current SSO watcher mode"
run = """
set -euo pipefail
MODE_FILE="$HOME/.aws/sso-renewer/mode"
if [ -f "$MODE_FILE" ]; then
  MODE=$(cat "$MODE_FILE" | tr -d '[:space:]')
else
  MODE="${SSO_LOGIN_MODE:-notify}"
fi

case "$MODE" in
  standalone) DESC="idle, manual login only" ;;
  auto)       DESC="opens webview on expiry" ;;
  silent)     DESC="token refresh only, no webview" ;;
  notify)     DESC="asks before opening webview" ;;
  *)          DESC="unknown" ;;
esac

echo "Current mode: $MODE — $DESC"
echo ""
echo "Available modes:"
echo "  notify      asks before opening webview (default)"
echo "  auto        opens webview immediately on expiry"
echo "  silent      token refresh only, no webview"
echo "  standalone  watcher idle, manual login only"
echo ""
echo "Switch with: mise run sso-mode:notify|auto|silent|standalone"
"""

[tasks."sso-mode:notify"]
description = "Switch watcher to notify mode (dialog before login)"
run = """
set -euo pipefail
mkdir -p "$HOME/.aws/sso-renewer"
echo "notify" > "$HOME/.aws/sso-renewer/mode"
echo "✓ Switched to notify mode (takes effect within ${SSO_POLL_SECONDS:-5}s)"
"""

[tasks."sso-mode:auto"]
description = "Switch watcher to auto mode (open webview immediately)"
run = """
set -euo pipefail
mkdir -p "$HOME/.aws/sso-renewer"
echo "auto" > "$HOME/.aws/sso-renewer/mode"
echo "✓ Switched to auto mode (takes effect within ${SSO_POLL_SECONDS:-5}s)"
"""

[tasks."sso-mode:silent"]
description = "Switch watcher to silent mode (token refresh only, no webview)"
run = """
set -euo pipefail
mkdir -p "$HOME/.aws/sso-renewer"
echo "silent" > "$HOME/.aws/sso-renewer/mode"
echo "✓ Switched to silent mode — refresh token only, no webview (takes effect within ${SSO_POLL_SECONDS:-5}s)"
"""

[tasks."sso-mode:standalone"]
description = "Switch watcher to standalone mode (manual login only)"
run = """
set -euo pipefail
mkdir -p "$HOME/.aws/sso-renewer"
echo "standalone" > "$HOME/.aws/sso-renewer/mode"
echo "✓ Switched to standalone mode — watcher idle, use 'mise run sso-login' to login manually"
"""

[tasks.sso-clean]
description = "Clean SSO watcher state, signal files, and cooldown"
run = """
set -euo pipefail
STATE_DIR="$HOME/.aws/sso-renewer"

echo "Cleaning SSO watcher state..."

# Remove signal files
rm -f "$STATE_DIR"/login-required*.json 2>/dev/null || true
echo "✓ Removed signal files"

# Remove lock directory
rm -rf "$STATE_DIR/login.lock" 2>/dev/null || true
echo "✓ Removed lock"

# Remove cooldown timestamp
rm -f "$STATE_DIR/last-login-at.txt" 2>/dev/null || true
echo "✓ Removed cooldown"

echo ""
echo "State cleaned"
"""

[tasks.config]
description = "Show current configuration from .env"
run = """
set -euo pipefail
if [ ! -f .env ]; then
  echo "No .env found. Run: mise run setup"
  exit 1
fi
echo "Current configuration (.env):"
echo ""
while IFS= read -r line; do
  [[ "$line" =~ ^[[:space:]]*$ ]] && continue
  printf "  %s\n" "$line"
done < .env
"""

[tasks."config:set"]
description = "Update a .env value (e.g.: mise run config:set PROXY_PORT=9000)"
run = """
set -euo pipefail
ASSIGNMENT="{{arg(name='assignment')}}"
KEY="${ASSIGNMENT%%=*}"
VALUE="${ASSIGNMENT#*=}"

if [ -z "$KEY" ] || [ "$KEY" = "$ASSIGNMENT" ]; then
  echo "Usage: mise run config:set KEY=VALUE"
  exit 1
fi
if [ ! -f .env ]; then
  echo "No .env found. Run: mise run setup"
  exit 1
fi

if grep -qE "^#?[[:space:]]*${KEY}=" .env; then
  sed -i.bak "s|^#*[[:space:]]*${KEY}=.*|${KEY}=${VALUE}|" .env && rm -f .env.bak
else
  printf '\n%s=%s\n' "$KEY" "$VALUE" >> .env
fi
echo "✓ Set ${KEY}=${VALUE}"

case "$KEY" in
  PROXY_PORT|S3_BUCKET_NAME|AWS_PROFILE|AWS_REGION|LOG_LEVEL|REFRESH_INTERVAL|CHECK_INTERVAL|SKIP_TLS_VERIFY|CONTAINER_ENGINE)
    echo "  Restart containers to apply: mise run containers:restart"
    ;;
  SSO_COOLDOWN_SECONDS|SSO_POLL_SECONDS|SSO_PROACTIVE_REFRESH_MINUTES|SSO_LOGIN_TIMEOUT)
    echo "  Restart SSO watcher to apply: mise run sso-restart"
    ;;
  SSO_LOGIN_MODE)
    echo "  Tip: toggle SSO mode live with: mise run sso-mode:notify|auto|silent|standalone"
    ;;
esac
"""

[tasks."tls-skip:enable"]
description = "Enable TLS skip for container pulls (corporate proxy with custom certs)"
run = """
set -euo pipefail
if [ ! -f .env ]; then
  echo "No .env found. Run: mise run setup"
  exit 1
fi
if grep -qE "^#?[[:space:]]*SKIP_TLS_VERIFY=" .env; then
  sed -i.bak "s|^#*[[:space:]]*SKIP_TLS_VERIFY=.*|SKIP_TLS_VERIFY=true|" .env && rm -f .env.bak
else
  printf '\nSKIP_TLS_VERIFY=true\n' >> .env
fi
echo "✓ TLS skip enabled (SKIP_TLS_VERIFY=true)"

# On macOS, podman runs in a VM. Registry operations happen inside the VM,
# so CONTAINERS_REGISTRIES_CONF set on the host has no effect.
# We must configure the VM's registries directly.
if command -v podman &>/dev/null && podman machine ssh "true" 2>/dev/null; then
  podman machine ssh "sudo mkdir -p /etc/containers/registries.conf.d && \
    printf '[[registry]]\nlocation = \"docker.io\"\ninsecure = true\n' | \
    sudo tee /etc/containers/registries.conf.d/skip-tls.conf > /dev/null"
  echo "✓ Configured podman machine VM (docker.io insecure=true)"
  echo "  Restarting podman machine to apply registry config..."
  MACHINE=$(podman machine list --format "{{.Name}}" --noheading 2>/dev/null | head -1)
  podman machine stop "$MACHINE"
  podman machine start "$MACHINE"
  echo "✓ Podman machine restarted"
fi
echo "  Start containers with: mise run containers:up"
"""

[tasks."tls-skip:disable"]
description = "Disable TLS skip for container pulls"
run = """
set -euo pipefail
if [ ! -f .env ]; then
  echo "No .env found. Run: mise run setup"
  exit 1
fi
if grep -qE "^#?[[:space:]]*SKIP_TLS_VERIFY=" .env; then
  sed -i.bak "s|^#*[[:space:]]*SKIP_TLS_VERIFY=.*|SKIP_TLS_VERIFY=false|" .env && rm -f .env.bak
else
  printf '\nSKIP_TLS_VERIFY=false\n' >> .env
fi
echo "✓ TLS skip disabled (SKIP_TLS_VERIFY=false)"

if command -v podman &>/dev/null && podman machine ssh "true" 2>/dev/null; then
  podman machine ssh "sudo rm -f /etc/containers/registries.conf.d/skip-tls.conf"
  echo "✓ Removed TLS skip config from podman machine VM"
  echo "  Restarting podman machine to apply registry config..."
  MACHINE=$(podman machine list --format "{{.Name}}" --noheading 2>/dev/null | head -1)
  podman machine stop "$MACHINE"
  podman machine start "$MACHINE"
  echo "✓ Podman machine restarted"
fi
echo "  Start containers with: mise run containers:up"
"""

[tasks."sso-clean:cookies"]
description = "Clear webview cached cookies (forces full re-auth on next login)"
run = """
set -euo pipefail
WEBVIEW_BIN="$HOME/.aws/sso-renewer/bin/SSOLogin.app/Contents/MacOS/sso-webview"

if [ ! -x "$WEBVIEW_BIN" ]; then
  echo "✗ Webview not installed (run: mise run sso-install)"
  exit 1
fi

"$WEBVIEW_BIN" --clear-cookies
echo "✓ Webview cookies cleared — next login will require full IdP auth"
"""
